pi:
  name_en: "Runke Huang"
  name_zh: "黄润珂"
  title_en: "Assistant Professor"
  title_zh: "助理教授"
  institution_en: "School of Humanities and Social Science, CUHK Shenzhen"
  institution_zh: "香港中文大学（深圳）人文社科学院"
  photo: "assets/images/team/pi-runke-huang.png"
  email: "runkehuang@cuhk.edu.cn"
  bio_en: "Dr. Runke Huang is an Assistant Professor at the School of Humanities and Social Science, The Chinese University of Hong Kong, Shenzhen. Her research focuses on early childhood education quality, child development, and evidence-based interventions, with particular expertise in randomized controlled trials and AI-powered assessment systems. She is the creator of ChildMind AI Education (童心智教), China's first LLM-based instructional quality assessment system for early childhood education."
  bio_zh: "黄润珂博士是香港中文大学（深圳）人文社科学院助理教授。她的研究方向包括幼儿教育质量评估、儿童发展及循证教育干预，特别擅长随机对照试验和AI驱动的评估系统。她是「童心智教」系统的创建者——中国首个基于大语言模型的幼儿教育教学质量评估系统。"
  education:
    - degree: "PhD"
      field_en: "Child Development and Learning"
      field_zh: "儿童发展与学习"
      institution: "University of Oxford"
      year: 2023
      supervisor: "Prof. Iram Siraj & Prof. Edward Melhuish"
    - degree: "MEd"
      field_en: "Education"
      field_zh: "教育学"
      institution: "The University of Hong Kong"
      year: 2018
      note_en: "with Distinction"
      note_zh: "优异"
    - degree: "BEd"
      field_en: "Early Childhood Education"
      field_zh: "学前教育"
      institution: "Beijing Normal University"
      year: 2017
  note_en: "Former Kindergarten Teacher"
  note_zh: "曾任幼儿园教师"
  links:
    scholar: "https://scholar.google.com/citations?user=Bj3DkxQAAAAJ"
    faculty: "https://myweb.cuhk.edu.cn/runkehuang"
    email: "runkehuang@cuhk.edu.cn"

