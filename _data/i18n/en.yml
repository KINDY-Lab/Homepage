about:
  label: "About KINDY Lab"
  title: "Where Developmental Science Meets Real-World Impact"
  desc: "KINDY Lab investigates the science of early childhood education — how classroom quality shapes children's cognitive, social-emotional, and behavioral development, and how targeted interventions can close opportunity gaps from the very start of life."
  quote: "Every child deserves a high-quality early education. Our role is to build the science — and the technology — that makes that possible at scale."
  cards:
    director_title: "Lab PI Overview"
    director_desc: "Learn about Dr. Huang's research vision, academic background, and current projects."
    director_link: "View Profile"
    join_title: "Join KINDY Lab"
    join_desc: "We welcome PhD students, RAs, and visiting scholars with a passion for early childhood science."
    join_link: "Open Positions"
    contact_title: "Get in Touch"
    contact_desc: "Interested in collaborating with us? Reach out to discuss research partnerships and opportunities."
    contact_link: "Contact Us"

research:
  label: "Research Areas"
  title: "Four Pillars of Early Childhood Science"
  desc: "Our work spans the full arc of early childhood education — from understanding what quality looks like to designing interventions that improve it, and increasingly, how AI can accelerate all of it."
  pillars:
    - num: "01"
      title: "Kindergarten Quality Evaluation"
      desc: "Measuring and improving process quality in early childhood settings using validated observational tools and multi-level analysis."
      tags: ["CLASS", "ECERS", "Observation", "HLM"]
    - num: "02"
      title: "Child Development & Assessment"
      desc: "Studying cognitive, social-emotional, and behavioral development in preschoolers using longitudinal and latent profile methods."
      tags: ["Self-Regulation", "Longitudinal", "Latent Profile", "Social-Emotional"]
    - num: "03"
      title: "Evidence-Based Interventions (RCT)"
      desc: "Designing and rigorously evaluating professional development programs through randomized controlled trials in kindergartens."
      tags: ["RCT", "Professional Development", "Teacher Quality", "Policy"]
    - num: "04"
      title: "AI in Early Education"
      desc: "Developing China's first LLM-based instructional quality assessment system — making scalable, expert-level evaluation accessible to all."
      tags: ["LLM", "EdTech", "NLP", "ChildMind AI"]
      flagship: true

