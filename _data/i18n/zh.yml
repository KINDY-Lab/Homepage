research:
  label: "研究方向"
  title: "幼儿教育科学的四大支柱"
  desc: "我们的工作覆盖幼儿教育的全链条——从理解什么是质量，到设计改善质量的干预措施，以及如何利用AI加速这一进程。"
  pillars:
    - num: "01"
      title: "幼儿园质量评估"
      desc: "运用经验证的观察工具与多层次分析方法，测量并改善早期教育环境中的过程质量。"
      tags: ["CLASS", "ECERS", "观察评估", "HLM"]
    - num: "02"
      title: "儿童发展与评估"
      desc: "运用纵向研究与潜在剖面方法，探究学前儿童的认知、社会情感和行为发展。"
      tags: ["自我调节", "纵向研究", "潜在剖面", "社会情感"]
    - num: "03"
      title: "循证教育干预（RCT）"
      desc: "通过在幼儿园开展随机对照试验，设计并严格评估教师专业发展项目。"
      tags: ["RCT", "专业发展", "教师质量", "政策"]
    - num: "04"
      title: "AI与早期教育"
      desc: "研发中国首个基于大语言模型的早期教育教学质量评估系统——让专家级评估触达更多幼儿园。"
      tags: ["LLM", "教育科技", "NLP", "童心智教"]
      flagship: true

