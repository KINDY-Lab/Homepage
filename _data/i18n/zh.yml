about:
  label: "关于 KINDY Lab"
  title: "当发展科学遇见现实影响"
  desc: "KINDY Lab致力于幼儿教育的科学研究——探究课堂质量如何影响儿童的认知、社会情感和行为发展，以及有针对性的干预措施如何从一开始就缩小机会差距。"
  quote: "每个孩子都应该享有高质量的早期教育。我们的使命，是构建让这一目标规模化实现的科学基础与技术工具。"
  cards:
