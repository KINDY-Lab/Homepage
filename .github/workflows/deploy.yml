name: Deploy to GitHub Pages & Sync Images to COS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Detect changed images
        id: changes
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'assets/images/')
          else
            CHANGED=$(find assets/images -type f)
            echo "### First commit — full sync fallback ###"
          fi
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No image changes detected, skipping COS sync."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            COUNT=$(echo "$CHANGED" | wc -l)
            echo "### $COUNT image(s) changed ###"
            echo "$CHANGED"
            mkdir -p /tmp/cos-sync
            echo "$CHANGED" | while read -r file; do
              if [ -f "$file" ]; then
                mkdir -p "/tmp/cos-sync/$(dirname "$file")"
                cp "$file" "/tmp/cos-sync/$file"
                echo "  Prepared: $file"
              fi
            done
          fi

      - name: Upload changed images to COS
        if: steps.changes.outputs.has_changes == 'true'
        uses: TencentCloud/cos-action@v1
        with:
          secret_id: ${{ secrets.COS_SECRET_ID }}
          secret_key: ${{ secrets.COS_SECRET_KEY }}
          cos_bucket: ${{ secrets.COS_BUCKET }}
          cos_region: ap-guangzhou
          local_path: /tmp/cos-sync/assets/images
          remote_path: assets/images
          clean: false

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
