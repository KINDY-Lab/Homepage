name: Deploy to GitHub Pages & Sync Images to COS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Sync images to COS (incremental)
        run: |
          # Download coscli
          wget -q https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64
          mv coscli-linux-amd64 coscli
          chmod +x coscli

          # Debug: verify secrets are injected (show first 4 chars only)
          echo "COS_SECRET_ID starts with: $(echo "${{ secrets.COS_SECRET_ID }}" | cut -c1-4)..."
          echo "COS_BUCKET is: ${{ secrets.COS_BUCKET }}"

          # Incremental sync — pass credentials via flags to skip config file
          ./coscli sync assets/images/ "cos://${{ secrets.COS_BUCKET }}/assets/images/" \
            --recursive \
            -i "${{ secrets.COS_SECRET_ID }}" \
            -k "${{ secrets.COS_SECRET_KEY }}" \
            -e "cos.ap-guangzhou.myqcloud.com" \
            --init-skip=true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
